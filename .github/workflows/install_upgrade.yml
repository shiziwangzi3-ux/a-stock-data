name: Install A-share technical upgrade

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/install_upgrade.yml"

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install upgrade files
        shell: bash
        run: |
          python - <<'PY'
          import base64
          from pathlib import Path

          technical_data = base64.b64decode(
              ""
          )
          update_workflow = base64.b64decode(
              ""
          )

          Path("technical_data.py").write_bytes(technical_data)
          Path(".github/workflows").mkdir(parents=True, exist_ok=True)
          Path(".github/workflows/update.yml").write_bytes(update_workflow)
          PY

      - name: Commit upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add technical_data.py .github/workflows/update.yml

          if git diff --cached --quiet; then
            echo "Upgrade already installed"
          else
            git commit -m "Install A-share technical indicator upgrade"
            git push
          fi
