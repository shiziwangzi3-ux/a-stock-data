name: Update A-share data

on:
  workflow_dispatch:
  schedule:
    - cron: "42 9,11,14,15 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: a-share-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Show trigger information
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "run_time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and verify quotes
        run: python update_data.py

      - name: Generate technical indicators
        run: python technical_data.py

      - name: Commit latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add latest.json technical.json

          if git diff --cached --quiet; then
            echo "No data change"
            exit 0
          fi

          git commit -m "Update A-share market and technical data"
          git pull --rebase origin main
          git push origin main
