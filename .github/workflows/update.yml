name: Update A-share data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "technical_data.py"
      - ".github/workflows/update.yml"
  schedule:
    - cron: "3-58/5 1-7 * * 1-5"
permissions:
  contents: write

concurrency:
  group: a-share-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and verify quotes
        run: python update_data.py

      - name: Generate technical indicators
        continue-on-error: true
        run: python technical_data.py

      - name: Commit latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add latest.json

          if [ -f technical.json ]; then
            git add technical.json
          fi

          if git diff --cached --quiet; then
            echo "No data change"
          else
            git commit -m "Update A-share market and technical data"
            git push
          fi
